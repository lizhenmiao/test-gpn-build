name: Windows Package Fixed

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_VERSION: 1.0.0
  RELEASE_TAG: v1.0.0
  GITEE_REPO_URL: https://gitee.com/chuncuideren/gpn

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Clone source from Gitee
        shell: pwsh
        run: |
          git clone --depth 1 "$env:GITEE_REPO_URL" source

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'
          cache: npm
          cache-dependency-path: source/gpn-tools-web/package-lock.json

      - name: Verify source layout
        shell: pwsh
        run: |
          if (-not (Test-Path source/gpn-tools-web/package.json)) {
            throw "Missing source/gpn-tools-web/package.json"
          }
          if (-not (Test-Path source/gpn-tools-server/pom.xml)) {
            throw "Missing source/gpn-tools-server/pom.xml"
          }

      - name: Build Vue app
        working-directory: source/gpn-tools-web
        shell: pwsh
        run: |
          npm ci
          npm run build

      - name: Build Spring Boot jar
        working-directory: source/gpn-tools-server
        shell: pwsh
        run: |
          mvn -B clean package -DskipTests

      - name: Package app-image and zip
        working-directory: source/gpn-tools-server
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path target -Filter *.jar |
            Where-Object { $_.Name -notlike '*original*' } |
            Select-Object -First 1

          if (-not $jar) {
            throw "No runnable jar found in target/"
          }

          New-Item -ItemType Directory -Path package-output -Force | Out-Null

          & jpackage `
            --name "GpnTools" `
            --type "app-image" `
            --dest "package-output" `
            --input "target" `
            --main-jar $jar.Name `
            --app-version $env:APP_VERSION `
            --vendor "GPN" `
            --description "GPN Tools" `
            --java-options "-Dfile.encoding=UTF-8" `
            --java-options "--server" `
            --win-console

          $appDir = Get-ChildItem -Path package-output -Directory | Select-Object -First 1
          if (-not $appDir) {
            throw "No app-image directory generated in package-output/"
          }

          $launcher = Join-Path $appDir.FullName "GpnTools.exe"
          if (-not (Test-Path $launcher)) {
            throw "Launcher not found: $launcher"
          }

          $zipName = "windows-x64-$env:APP_VERSION.zip"
          $zipPath = Join-Path (Resolve-Path package-output) $zipName
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }

          Compress-Archive -Path $appDir.FullName -DestinationPath $zipPath

          "ASSET_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create release if missing
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$env:RELEASE_TAG" -R "$env:GITHUB_REPOSITORY" *> $null

          if ($LASTEXITCODE -ne 0) {
            $notesFile = Join-Path $env:RUNNER_TEMP "release-notes.txt"
            @(
              "Windows app-image package (zip)."
              "Unzip and run GpnTools/GpnTools.exe."
              "Source: $env:GITEE_REPO_URL"
              "Run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            ) | Set-Content -Path $notesFile -Encoding utf8

            gh release create "$env:RELEASE_TAG" -R "$env:GITHUB_REPOSITORY" --title "$env:RELEASE_TAG" --notes-file "$notesFile"
          }

      - name: Upload zip asset to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$env:RELEASE_TAG" "$env:ASSET_PATH" -R "$env:GITHUB_REPOSITORY" --clobber

