name: Manual Desktop Package

on:
  workflow_dispatch:
    inputs:
      source:
        description: Build source
        required: true
        default: github
        type: choice
        options:
          - github
          - gitee
      version:
        description: Release version (format: 1.0.0)
        required: true
        default: 1.0.0
        type: string
      github_ref:
        description: GitHub ref (branch/tag/SHA), used when source=github
        required: false
        default: ''
        type: string
      gitee_repo_url:
        description: Gitee repo URL, used when source=gitee
        required: false
        default: ''
        type: string
      gitee_branch:
        description: Gitee branch, used when source=gitee
        required: false
        default: master
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    name: prepare-release
    runs-on: ubuntu-22.04
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - name: Validate version and prepare metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '${VERSION}'. Expected format: 1.0.0" >&2
            exit 1
          fi

          RELEASE_TAG="v${VERSION}"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create release if missing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; assets will be updated."
          else
            NOTES_FILE="${RUNNER_TEMP}/release-notes.txt"
            cat > "${NOTES_FILE}" <<EOF
            Manual build and package upload.
            
            Source: ${{ inputs.source }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            EOF
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file "${NOTES_FILE}"
          fi

  package:
    name: ${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-exe
            os: windows-latest
            pkg_type: exe
            asset_os: windows
          - id: macos-dmg
            os: macos-latest
            pkg_type: dmg
            asset_os: macos
          - id: linux-deb
            os: ubuntu-22.04
            pkg_type: deb
            asset_os: linux
          - id: linux-rpm
            os: ubuntu-22.04
            pkg_type: rpm
            asset_os: linux

    steps:
      - name: Checkout from GitHub
        if: ${{ inputs.source == 'github' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: source
          ref: ${{ inputs.github_ref != '' && inputs.github_ref || github.ref_name }}

      - name: Clone from Gitee
        if: ${{ inputs.source == 'gitee' }}
        shell: bash
        env:
          GITEE_REPO_URL: ${{ inputs.gitee_repo_url }}
          GITEE_BRANCH: ${{ inputs.gitee_branch }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITEE_REPO_URL}" ]; then
            echo "gitee_repo_url is required when source=gitee" >&2
            exit 1
          fi

          if [ -n "${GITEE_USERNAME:-}" ] && [ -n "${GITEE_TOKEN:-}" ]; then
            cat > askpass.sh <<'EOF'
            #!/usr/bin/env bash
            case "$1" in
              *Username*) echo "$GITEE_USERNAME" ;;
              *Password*) echo "$GITEE_TOKEN" ;;
            esac
            EOF
            chmod +x askpass.sh
            export GIT_ASKPASS="$PWD/askpass.sh"
            export GIT_TERMINAL_PROMPT=0
            git clone --depth 1 --branch "${GITEE_BRANCH}" "${GITEE_REPO_URL}" source
            rm -f askpass.sh
          else
            git clone --depth 1 --branch "${GITEE_BRANCH}" "${GITEE_REPO_URL}" source
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: source/gpn-tools-web/package-lock.json

      - name: Install Linux packaging tools
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Install WiX toolset (required by jpackage on Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify source layout
        shell: bash
        run: |
          set -euo pipefail
          test -f source/gpn-tools-web/package.json
          test -f source/gpn-tools-server/pom.xml

      - name: Build Vue app
        working-directory: source/gpn-tools-web
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Build Spring Boot jar
        working-directory: source/gpn-tools-server
        shell: bash
        run: |
          set -euo pipefail
          mvn -B clean package -DskipTests

      - name: Resolve jar name
        id: meta
        working-directory: source/gpn-tools-server
        shell: bash
        run: |
          set -euo pipefail

          JAR_PATH="$(ls target/*.jar | grep -v 'original' | head -n 1 || true)"
          if [ -z "${JAR_PATH}" ]; then
            echo "No runnable jar found in target/" >&2
            exit 1
          fi

          echo "jar_name=$(basename "${JAR_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Package with jpackage
        working-directory: source/gpn-tools-server
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p package-output

          EXTRA_ARGS=()
          if [ "${{ matrix.pkg_type }}" = "exe" ]; then
            EXTRA_ARGS+=(--win-console)
          fi

          jpackage \
            --name "GpnTools" \
            --type "${{ matrix.pkg_type }}" \
            --dest package-output \
            --input target \
            --main-jar "${{ steps.meta.outputs.jar_name }}" \
            --app-version "${{ inputs.version }}" \
            --vendor "GPN" \
            --description "GPN Tools" \
            --java-options "-Dfile.encoding=UTF-8" \
            "${EXTRA_ARGS[@]}"

      - name: Rename package to target filename
        id: rename
        working-directory: source/gpn-tools-server
        shell: bash
        run: |
          set -euo pipefail

          PKG_FILE="$(find package-output -maxdepth 1 -type f | head -n 1 || true)"
          if [ -z "${PKG_FILE}" ]; then
            echo "No package file found in package-output/" >&2
            exit 1
          fi

          case "${RUNNER_ARCH}" in
            X64) ASSET_ARCH="x64" ;;
            ARM64) ASSET_ARCH="arm64" ;;
            *) ASSET_ARCH="$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')" ;;
          esac

          TARGET_NAME="${{ matrix.asset_os }}-${ASSET_ARCH}-${{ inputs.version }}.${{ matrix.pkg_type }}"
          TARGET_PATH="package-output/${TARGET_NAME}"
          mv "${PKG_FILE}" "${TARGET_PATH}"

          echo "asset_path=${TARGET_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload asset to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          ASSET_PATH: source/gpn-tools-server/${{ steps.rename.outputs.asset_path }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" "${ASSET_PATH}" --clobber
